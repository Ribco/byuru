# SSL/TLS Example - HTTPS with Let's Encrypt / ZeroSSL
# Place cert files at the paths below, or use auto_ssl

worker_processes auto;
worker_connections 1024;

events {
    worker_connections 1024;
}

http {
    access_log /var/log/byuru/access.log;
    error_log /var/log/byuru/error.log;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name example.com www.example.com;
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name example.com www.example.com;
        root /var/www/html;
        index index.html;

        # Manual cert paths (use auto_ssl for automatic issuance)
        ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

        location / {
            try_files $uri $uri/ =404;
        }

        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
    }
}
