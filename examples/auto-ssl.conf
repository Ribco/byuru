# Auto SSL Example - Automatic certificate issuance
# Requires acme.sh installed: curl https://get.acme.sh | sh

worker_processes auto;
worker_connections 1024;

events {
    worker_connections 1024;
}

http {
    access_log /var/log/byuru/access.log;
    error_log /var/log/byuru/error.log;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name example.com;
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS with auto SSL
    server {
        listen 443 ssl;
        server_name example.com;
        root /var/www/html;
        index index.html;

        # Auto-issue certificate via acme.sh
        auto_ssl on;
        auto_ssl_email admin@example.com;

        location / {
            try_files $uri $uri/ =404;
        }

        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
    }
}
